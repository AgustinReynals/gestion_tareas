<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-full h-screen flex justify-center items-center">
        <form action="/register" method="POST" class="w-110 flex flex-col gap-5 items-center border p-10">
            
            <h2 class="font-extrabold text-2xl mb-5">Registro</h2>
            
            <div class="flex flex-col w-[95%]">
                <label for="">Nombre</label>
                <input type="text" name="nombre" id="nombre" class="border h-10 rounded-xl">
            </div>
            <div class="flex flex-col w-[95%]">
                <label for="">Email</label>
                <input type="email" name="email" id="email" class="border h-10 rounded-xl">
            </div>
            <div class="flex flex-col w-[95%]">
                <label for="">Contraseña</label>
                <input type="password" name="contrasena" id="password" class="border h-10 rounded-xl">
            </div>
            <input type="submit" value="Iniciar Sesión" class="bg-green-600 text-white p-3 px-5  rounded-2xl hover:bg-green-800">
            <div class="flex gap-1"> 
                <p>¿Ya tiene cuenta?</p> 
                <a href="/" class="hover:text-cyan-900">Iniciar sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
